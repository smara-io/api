<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smara API Reference</title>
  <meta name="description" content="Persistent memory for AI agents. Store, search, and recall facts with Ebbinghaus decay scoring, contradiction detection, and semantic search." />
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <script id="api-reference" data-url="./openapi.yaml" data-configuration='{
    "theme": "kepler",
    "layout": "modern",
    "darkMode": true,
    "hiddenClients": ["c", "objc", "ocaml", "powershell", "swift", "r", "kotlin", "java", "csharp", "clojure", "httpie", "wget"],
    "defaultHttpClient": { "targetKey": "shell", "clientKey": "curl" },
    "metaData": {
      "title": "Smara API Reference",
      "description": "Persistent memory for AI agents."
    },
    "servers": [
      { "url": "https://api.smara.io", "description": "Production" }
    ]
  }'></script>
  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
</body>
</html>
